<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Arqueiros 2D: Duelo Stickman</title>
    <style>
        body {
            margin: 0;
            overflow: hidden; /* Remove barras de rolagem */
            background-color: #f0f8ff; /* Cor de fundo leve */
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        canvas {
            display: block;
            border: 1px solid #ccc;
            background-color: #a0e0ff; /* Céu azul claro */
        }
        #game-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: rgba(0, 0, 0, 0.7);
            color: white;
            font-size: 2em;
            text-align: center;
            pointer-events: none; /* Não interfere com o canvas por padrão */
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        #game-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        #game-overlay button {
            padding: 15px 30px;
            font-size: 0.8em;
            margin-top: 20px;
            cursor: pointer;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            transition: background-color 0.3s ease;
        }
        #game-overlay button:hover {
            background-color: #45a049;
        }
        #level-info {
            position: absolute;
            top: 10px;
            left: 10px;
            color: black;
            font-size: 1.2em;
            background-color: rgba(255, 255, 255, 0.7);
            padding: 5px 10px;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="game-overlay">
        <span id="overlay-text"></span>
        <button id="restartButton">Jogar Novamente</button>
    </div>
    <div id="level-info">Nível: <span id="current-level">1</span></div>
    <script src="game.js"></script>
</body>
</html>
